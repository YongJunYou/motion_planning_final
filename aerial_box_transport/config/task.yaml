# Task-side parameters (spec section 11: task.yaml holds box, a_z profile, timings).

# M3 box payload. MVP keeps the vertical linear channel; inertia is added with rotation later.
box:
  m_o: 0.8                     # mass [kg]. cubebox_a01 has no authored mass, so PhysX derives
                               # it from cardboard density 689 kg/m^3 x volume (~0.105^3) ~= 0.8 kg.
  size: [0.106, 0.105, 0.105]  # edge lengths [m], measured from the USD (a ~10.5 cm cube).

gravity: 9.81               # [m/s^2].

# Transport burst used by the dynamic slip simulation.
transport:
  t_accel: 0.5              # duration of the constant upward acceleration burst [s].
  dt: 1.0e-3               # integration step [s].

# M4 multi-phase OCP: grasp geometry and phase schedule.
# Grasp arm configs are [dof2, dof3, dof4]; the wrist (dof4) rotates the pad so its
# flat face points along world x and the two pads face each other across the box.
# Without the wrist the pads point along the reach direction and cannot grasp.
# Derived from the actual pad mesh by src/model/grasp_search.py.
ocp:
  # TASK: box pick-up and place locations [x, y, z] in the home frame (home = drone
  # spawn = origin). The drone starts at home, flies to the grasp hover, grasps,
  # carries the box to `place`, and releases. The pick->place x change is along the
  # squeeze axis so only the vertical change loads friction (slip-aware law valid).
  # Matched to the teammate's scene (home = drone spawn at world (0,0,1.5)):
  #   box on the desk at world (2,0,0.838 center)  -> pick = box - spawn = (2,0,-0.662)
  #   place on the rack 1.31 m shelf at world (-2,0,1.365) -> place = (-2,0,-0.135)
  pick:  [2.0, 0.0, -0.662]   # box on the desk (+x, ~0.66 m below spawn); world (2,0,0.838)
  place: [-2.0, 0.0, 0.466]   # rack TOP shelf (z~1.91, open above): world (-2,0,1.966), +1.13 m up
  place_rise: 0.6             # only the initial GUESS climbs this high; the actual path is
  #                            DISCOVERED by the obstacle keep-out constraints below.
  # Obstacle bounding boxes (world coords). The box center must stay above `top` (+ box
  # half-height) whenever it is over the x-y footprint -> the OCP discovers up-and-over.
  obstacles:
    desk: {x: [1.68, 2.32], y: [-0.96, 0.96], top: 0.781}   # desk top surface
    rack: {x: [-2.35, -1.65], y: [-0.80, 0.80], top: 1.91}  # rack top shelf (the landing)
  half_extent: 0.0525               # half the grasped (x) box dimension [m] (10.5 cm box)
  # Arm configs are [dof1, dof2, dof3, dof4]. dof1 (applied with OPPOSITE sign on the two arms)
  # tilts both arms DOWN ~27 cm so the pads reach the box while the BASE hovers ~33 cm above the
  # desk/rack surface (avoids ground effect + collision). dof1 preserves the pad x (grip width) and
  # the world-x face normal; dof2-dof3-dof4 = 0 keeps the two pads parallel (vertical faces pressing
  # the box +-x faces). The base->pad offset r_off (including its -27 cm z) is derived from arm_grasp.
  arm_pregrasp: [0.6789, 2.4353, 1.0866, 1.3487]  # PARALLEL-jaw OPEN: ~20 cm gap, SAME reach-down as
  #   arm_grasp; only the gap differs, so closing is a pure parallel squeeze. Used when NOT holding.
  arm_grasp: [0.6789, 2.56, 1.16, 1.4]            # CLOSED grip: ~10.5 cm gap (box width), pads down
  base_clearance: 0.30            # the base must stay >= this far [m] above the desk/rack surfaces
  squeeze_grasp: 22.0             # grasp squeeze [N]: close the pads ~11 mm into the box so the
  #                                friction grip is firm enough to hold the 0.8 kg box when lifted
  k_planner: 2000.0               # contact stiffness for OCP
  durations: {approach: 3.0, grasp: 1.6, transport: 5.0, release: 1.2}  # gentler: better tracking,
  #                                less inertial load on the friction grip, time for the grip to set
  dt: 0.1

# Acceleration sweep for the headline experiment.
sweep:
  a_z_min: 0.0
  a_z_max: 20.0
  n_points: 81
  drop_threshold: 0.06      # slip distance counted as a dropped box [m] (~half the box).
